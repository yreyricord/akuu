<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>AKUU, solidarité internationale en Amazonie péruvienne</title>
    <meta name="description" content="AKUU agit pour un développement durable, solidaire et respectueux des populations amazoniennes au village de Puerto Miguel, Pérou." />
    <!-- title + description mis à jour par l’app selon la locale (voir App.vue) -->
  </head>
  <body class="bg-cream text-night font-sans antialiased selection:bg-leaf/30 selection:text-forest">
    <!-- Requis par Netlify Forms (SPA) : mêmes champs que ContactView ; l’envoi est fait en fetch depuis Vue. -->
    <form name="contact" netlify netlify-honeypot="bot-field" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
